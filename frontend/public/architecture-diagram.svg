<svg viewBox="0 0 1000 480" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#5EEAD4"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="480" fill="#0d0f0d"/>

  <!-- subtle grid dots -->
  <g fill="#1c1f1c">
    <circle cx="40" cy="40" r="2"/><circle cx="120" cy="90" r="2"/><circle cx="880" cy="60" r="2"/>
    <circle cx="960" cy="140" r="2"/><circle cx="60" cy="420" r="2"/><circle cx="940" cy="420" r="2"/>
    <circle cx="500" cy="30" r="2"/><circle cx="500" cy="450" r="2"/>
  </g>

  <text x="500" y="40" text-anchor="middle" fill="#e5e7eb" font-size="20" font-weight="bold">Portfolio — Architecture</text>

  <!-- User -->
  <rect x="40" y="200" width="140" height="70" rx="10" fill="#151815" stroke="#3a3f3a" stroke-width="1.5"/>
  <text x="110" y="230" text-anchor="middle" fill="#9ca3af" font-size="13">&gt;_ visitor</text>
  <text x="110" y="250" text-anchor="middle" fill="#f3f4f6" font-size="15" font-weight="bold">User</text>

  <!-- Frontend -->
  <rect x="290" y="160" width="220" height="150" rx="12" fill="#101210" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="400" y="192" text-anchor="middle" fill="#5EEAD4" font-size="14" font-weight="bold">frontend/</text>
  <text x="400" y="216" text-anchor="middle" fill="#e5e7eb" font-size="13">React SPA</text>
  <line x1="315" y1="230" x2="485" y2="230" stroke="#2a2e2a"/>
  <text x="400" y="252" text-anchor="middle" fill="#9ca3af" font-size="12">About · Skills · Projects</text>
  <text x="400" y="270" text-anchor="middle" fill="#9ca3af" font-size="12">Experience · Contact · Resume</text>
  <text x="400" y="292" text-anchor="middle" fill="#6b7280" font-size="11">deployed on Render</text>

  <!-- Backend -->
  <rect x="630" y="160" width="230" height="150" rx="12" fill="#101210" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="745" y="192" text-anchor="middle" fill="#5EEAD4" font-size="14" font-weight="bold">backend/</text>
  <text x="745" y="216" text-anchor="middle" fill="#e5e7eb" font-size="13">Node.js + Express</text>
  <line x1="655" y1="230" x2="835" y2="230" stroke="#2a2e2a"/>
  <text x="745" y="252" text-anchor="middle" fill="#9ca3af" font-size="12">Contact form handler</text>
  <text x="745" y="270" text-anchor="middle" fill="#9ca3af" font-size="12">Visitor tracking / status check</text>
  <text x="745" y="292" text-anchor="middle" fill="#6b7280" font-size="11">REST API</text>

  <!-- arrows -->
  <line x1="180" y1="235" x2="285" y2="235" stroke="#5EEAD4" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="232" y="222" text-anchor="middle" fill="#6b7280" font-size="11">visits</text>

  <line x1="510" y1="225" x2="625" y2="225" stroke="#5EEAD4" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="567" y="212" text-anchor="middle" fill="#6b7280" font-size="11">API calls</text>

  <line x1="625" y1="255" x2="510" y2="255" stroke="#3a3f3a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="567" y="272" text-anchor="middle" fill="#6b7280" font-size="11">JSON response</text>

  <!-- outputs -->
  <rect x="700" y="370" width="100" height="60" rx="10" fill="#151815" stroke="#3a3f3a" stroke-width="1.5"/>
  <text x="750" y="397" text-anchor="middle" fill="#e5e7eb" font-size="12">Email</text>
  <text x="750" y="415" text-anchor="middle" fill="#6b7280" font-size="10">(contact)</text>

  <rect x="820" y="370" width="120" height="60" rx="10" fill="#151815" stroke="#3a3f3a" stroke-width="1.5"/>
  <text x="880" y="397" text-anchor="middle" fill="#e5e7eb" font-size="12">Visitor Log</text>
  <text x="880" y="415" text-anchor="middle" fill="#6b7280" font-size="10">(status check)</text>

  <line x1="730" y1="310" x2="755" y2="368" stroke="#3a3f3a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="800" y1="310" x2="860" y2="368" stroke="#3a3f3a" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
